<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear historia | Willpig Studio</title>
  <link rel="stylesheet" href="style1.2.css" />
  <link rel="icon" type="image/x-icon" href="/public/img/img.ico/logo.ico" />
</head>
<body>

  <!-- 🧭 Barra superior -->
  <header class="story-header">
    <div class="header-left">
      <a href="/" class="back-link">← Volver</a>
      <h2>Agregar información de la historia</h2>
    </div>

    <div class="header-actions">
      <button class="btn-canceler">Cancelar</button>
      <button class="btn-savever">Guardar</button>
    </div>
  </header>

  <!--  Contenedor principal -->
  <main class="new-storys">
    <!--  Lado izquierdo: portada -->
    <div class="story-cover">
      <div class="cover-box">
        <img id="coverPreview" src="/img/placeholder-cover.png" alt="Portada" />
        <label for="coverInput" class="btn-upload">Añadir una portada</label>
        <input type="file" id="coverInput" accept="image/*" hidden>
      </div>
    </div>

    <!--  Lado derecho: formulario -->
    <form class="story-form" action="/newstory" method="POST">
      <section class="story-details">
        <h3>Detalles de la historia</h3>

        <div class="form-group">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" name="titulo" placeholder="Historia sin título" required>
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" name="descripcion" placeholder="Describe brevemente tu historia..."></textarea>
        </div>

        <div class="form-group">
          <label for="personajes">Personajes principales</label>
          <div class="inline-group">
            <input type="text" id="personajes" name="personajes" placeholder="Nombre de personaje">
            <button type="button" class="btn-add">+</button>
          </div>
        </div>

        <div class="form-group">
          <label for="categoria">Categoría</label>
          <select id="categoria" name="categoria">
            <option value="">Selecciona una categoría</option>
            <option value="fantasia">Fantasía</option>
            <option value="romance">Romance</option>
            <option value="aventura">Aventura</option>
            <option value="drama">Drama</option>
            <option value="infantil">Infantil</option>
          </select>
        </div>

        <div class="form-group">
          <label for="etiquetas">Etiquetas</label>
          <input type="text" id="etiquetas" name="etiquetas" placeholder="Agrega etiquetas separadas por comas">
        </div>

        <div class="form-group">
          <label for="audiencia">Audiencia principal</label>
          <select id="audiencia" name="audiencia">
            <option value="">Selecciona una opción</option>
            <option value="general">General</option>
            <option value="adolescentes">Adolescentes</option>
            <option value="adultos">Adultos</option>
          </select>
        </div>

        <div class="form-group">
          <label for="idioma">Idioma</label>
          <select id="idioma" name="idioma">
            <option value="es">Español</option>
            <option value="en">Inglés</option>
          </select>
        </div>

        <div class="form-group">
          <label for="derechos">Derechos de autor</label>
          <select id="derechos" name="derechos">
            <option value="todos">Todos los derechos reservados</option>
            <option value="compartido">Uso compartido con créditos</option>
            <option value="libre">Dominio público</option>
          </select>
        </div>

        <div class="form-group">
          <label>Clasificación</label>
          <div class="inline-group">
            <label><input type="radio" name="clasificacion" value="todo" checked> Todo público</label>
            <label><input type="radio" name="clasificacion" value="maduro"> Maduro</label>
          </div>
        </div>
      </section>
    </form>
  </main>

</body>
</html>
<script>
  const input = document.getElementById("portada");
  const label = document.querySelector(".cover-box");

  input.addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
      const imgURL = URL.createObjectURL(file);
      label.innerHTML = `<img src="${imgURL}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">`;
    }
  });
</script>
